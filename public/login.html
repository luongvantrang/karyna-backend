<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Auto Login</title>
    <style>
        body { background:#000; color:#fff; font-family:Arial; text-align:center; padding-top:100px; }
        h2 { color:#e50914; }
        .loading { margin: 30px auto; width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #e50914; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Đang chuẩn bị đăng nhập Netflix...</h2>
    <div class="loading"></div>
    <p id="status">Vui lòng chờ...</p>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            document.getElementById('status').innerHTML = '❌ Link không hợp lệ!';
            throw new Error("No ID");
        }

        fetch(`/api/get?id=${id}`)
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    document.getElementById('status').innerHTML = `❌ ${data.message}`;
                    return;
                }

                const cookies = data.cookies;
                for (const [name, value] of Object.entries(cookies)) {
                    document.cookie = `${name}=${value};domain=.netflix.com;path=/;expires=Fri, 31 Dec 2026 23:59:59 GMT`;
                }

                document.getElementById('status').innerHTML = '✅ Đăng nhập thành công! Đang chuyển hướng...';
                setTimeout(() => {
                    window.location.href = "https://www.netflix.com/browse";
                }, 1500);
            })
            .catch(err => {
                document.getElementById('status').innerHTML = '❌ Lỗi kết nối!';
            });
    </script>
</body>
</html>
