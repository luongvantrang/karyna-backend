<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Free Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Background animated */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #000 0%, #1a0000 50%, #000 100%);
            z-index: -1;
        }

        .bg::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(229,9,20,0.15) 0%, transparent 60%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* Card chính */
        .card {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(229, 9, 20, 0.3);
            border-radius: 16px;
            padding: 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 60px rgba(229, 9, 20, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            color: #e50914;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Thông tin acc */
        .acc-info {
            background: rgba(229, 9, 20, 0.1);
            border: 1px solid rgba(229, 9, 20, 0.3);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }

        .acc-info.show {
            display: block;
        }

        .acc-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .acc-info-row:last-child {
            border-bottom: none;
        }

        .acc-info-row .label {
            color: #999;
        }

        .acc-info-row .value {
            color: #fff;
            font-weight: bold;
        }

        .value.green { color: #2ecc71; }
        .value.red { color: #e50914; }

        /* Nút bấm */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: #e50914;
            color: #fff;
        }

        .btn-primary:hover {
            background: #f40612;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4);
        }

        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: transparent;
            color: #999;
            border: 1px solid #333;
            font-size: 13px;
            padding: 10px;
        }

        .btn-secondary:hover {
            border-color: #e50914;
            color: #e50914;
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(229, 9, 20, 0.2);
            border-top: 3px solid #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status message */
        .status {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
            min-height: 20px;
        }

        .status.success { color: #2ecc71; }
        .status.error { color: #e50914; }
        .status.loading { color: #f39c12; }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 20px;
            display: none;
        }

        .progress-bar.show { display: block; }

        .progress-fill {
            height: 100%;
            background: #e50914;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s ease;
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }

        /* Step indicator */
        .steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .step {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            transition: all 0.3s ease;
        }

        .step.active { background: #e50914; transform: scale(1.3); }
        .step.done { background: #2ecc71; }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div class="card">
        <!-- Logo -->
        <div class="logo">NETFLIX</div>
        <div class="subtitle">Free Account Share - Powered by Bot</div>

        <!-- Step indicator -->
        <div class="steps">
            <div class="step active" id="step1"></div>
            <div class="step" id="step2"></div>
            <div class="step" id="step3"></div>
        </div>

        <!-- Thông tin acc (ẩn lúc đầu) -->
        <div class="acc-info" id="accInfo">
            <div class="acc-info-row">
                <span class="label">📦 Plan</span>
                <span class="value green" id="accPlan">-</span>
            </div>
            <div class="acc-info-row">
                <span class="label">🌍 Country</span>
                <span class="value" id="accCountry">-</span>
            </div>
            <div class="acc-info-row">
                <span class="label">📅 Billing</span>
                <span class="value" id="accBilling">-</span>
            </div>
        </div>

        <!-- Spinner -->
        <div class="spinner" id="spinner"></div>

        <!-- Progress bar -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Status -->
        <div class="status" id="status">Nhấn nút để lấy tài khoản Netflix miễn phí</div>

        <!-- Nút chính -->
        <button class="btn btn-primary" id="mainBtn" onclick="getAccount()">
            🍿 Lấy Acc Netflix Miễn Phí
        </button>

        <!-- Nút phụ (ẩn lúc đầu) -->
        <button class="btn btn-secondary" id="retryBtn" style="display:none;" onclick="retryLogin()">
            🔄 Thử lại (Acc khác)
        </button>

        <div class="footer">
            ⚠️ Sử dụng VPN US để đạt hiệu quả tốt nhất<br>
            Không logout sau khi dùng xong
        </div>
    </div>

    <script>
        // ⚠️ THAY BẰNG URL VERCEL CỦA BẠN
        const API_URL = 'https://ten-du-an-cua-ban.vercel.app/api/get';

        let currentCookies = null;

        // ==============================
        // Hàm gọi API lấy acc
        // ==============================
        async function getAccount() {
            const btn = document.getElementById('mainBtn');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');
            const accInfo = document.getElementById('accInfo');

            // Disable nút
            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';
            spinner.style.display = 'block';
            accInfo.classList.remove('show');

            // Update step
            setStep(1);
            setStatus('loading', '🔍 Đang tìm kiếm tài khoản...');

            try {
                // Gọi API
                const response = await fetch(API_URL);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || 'Hết acc rồi!');
                }

                const { plan, country, billing, cookies } = result.data;
                currentCookies = cookies;

                // Hiện thông tin acc
                setStep(2);
                setStatus('success', '✅ Tìm thấy tài khoản! Đang inject cookie...');
                
                document.getElementById('accPlan').textContent = plan;
                document.getElementById('accCountry').textContent = country;
                document.getElementById('accBilling').textContent = billing;
                accInfo.classList.add('show');

                // Inject cookie
                await injectCookies(cookies);

            } catch (error) {
                spinner.style.display = 'none';
                btn.disabled = false;
                btn.textContent = '🍿 Lấy Acc Netflix Miễn Phí';
                setStatus('error', `❌ ${error.message}`);
            }
        }

        // ==============================
        // Hàm inject cookie vào trình duyệt
        // ==============================
        async function injectCookies(cookies) {
            const spinner = document.getElementById('spinner');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const retryBtn = document.getElementById('retryBtn');

            spinner.style.display = 'none';
            progressBar.classList.add('show');

            const cookieEntries = Object.entries(cookies);
            const total = cookieEntries.length;

            for (let i = 0; i < total; i++) {
                const [name, value] = cookieEntries[i];
                document.cookie = `${name}=${value};domain=.netflix.com;path=/;expires=Fri, 31 Dec 2026 23:59:59 GMT;SameSite=Lax`;
                
                // Update progress bar
                const progress = ((i + 1) / total) * 100;
                progressFill.style.width = progress + '%';
                setStatus('loading', `⚙️ Đang inject cookie (${i + 1}/${total})...`);
                
                await sleep(200);
            }

            // Xong
            setStep(3);
            setStatus('success', '✅ Thành công! Đang chuyển hướng đến Netflix...');

            retryBtn.style.display = 'block';

            // Đếm ngược rồi redirect
            let count = 3;
            const countdown = setInterval(() => {
                setStatus('success', `✅ Chuyển hướng sau ${count} giây...`);
                count--;
                if (count < 0) {
                    clearInterval(countdown);
                    window.location.href = 'https://www.netflix.com/browse';
                }
            }, 1000);
        }

        // ==============================
        // Hàm Retry (Thử acc khác)
        // ==============================
        function retryLogin() {
            document.getElementById('progressBar').classList.remove('show');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('accInfo').classList.remove('show');
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').textContent = '🍿 Lấy Acc Netflix Miễn Phí';
            setStep(1);
            setStatus('', 'Nhấn nút để lấy tài khoản Netflix miễn phí');
            getAccount();
        }

        // ==============================
        // Hàm helper
        // ==============================
        function setStatus(type, message) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = message;
        }

        function setStep(step) {
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById(`step${i}`);
                if (i < step) el.className = 'step done';
                else if (i === step) el.className = 'step active';
                else el.className = 'step';
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
